<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT bhopal seniors smasher</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        h1 {
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        #menu {
            background: #2f3542;
            padding: 20px 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .legend {
            font-size: 1.2rem;
            margin: 10px 0;
            font-weight: bold;
        }

        button {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        #gameArea {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background-color: #2c3e50;
            border: 4px solid #ff4757;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        #scoreBoard {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .game-over-text {
            color: #ff4757;
            margin-top: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1>NIT bhopal seniors smasher</h1>

    <div id="menu">
        <div class="legend">🤡 = Nit bhopal seniors</div>
        <div class="legend">🗿 = sigma juniors</div>
        <button id="playBtn">Play</button>
    </div>

    <div id="gameArea">
        <div id="scoreBoard">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOverMsg" class="game-over-text"></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const playBtn = document.getElementById("playBtn");
        const menu = document.getElementById("menu");
        const gameArea = document.getElementById("gameArea");
        const scoreElement = document.getElementById("score");
        const gameOverMsg = document.getElementById("gameOverMsg");

        const box = 25; // Grid size
        let score = 0;
        let snake = [];
        let food = {};
        let d; // Direction
        let gameLoop;

        // Listen to keyboard for movement
        document.addEventListener("keydown", direction);

        function direction(event) {
            if (event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (event.keyCode == 38 && d != "DOWN") d = "UP";
            else if (event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / box)) * box,
                y: Math.floor(Math.random() * (canvas.height / box)) * box
            };
        }

        function drawGame() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Snake (Sigma Juniors 🗿)
            ctx.font = "20px Arial";
            ctx.textBaseline = "top";
            
            for (let i = 0; i < snake.length; i++) {
                ctx.fillText("🗿", snake[i].x, snake[i].y);
            }

            // Draw Food (Seniors 🤡)
            ctx.fillText("🤡", food.x, food.y);

            // Old head position
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Move direction
            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Check if food is eaten
            if (snakeX === food.x && snakeY === food.y) {
                score += 20; // 20 points per catch
                scoreElement.innerHTML = score;
                spawnFood();
            } else {
                // Remove the tail
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over conditions (Wall collision or Self collision)
            if (
                snakeX < 0 || 
                snakeX >= canvas.width || 
                snakeY < 0 || 
                snakeY >= canvas.height || 
                collision(newHead, snake)
            ) {
                clearInterval(gameLoop);
                gameOverMsg.innerHTML = "Game Over! You smashed " + (score/20) + " seniors. Refresh to play again.";
                return;
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        // Start game button logic
        playBtn.addEventListener("click", () => {
            menu.style.display = "none";
            gameArea.style.display = "flex";
            
            // Initialize game variables
            snake = [];
            snake[0] = { x: 9 * box, y: 9 * box };
            score = 0;
            scoreElement.innerHTML = score;
            d = null; // No initial movement until user hits an arrow key
            gameOverMsg.innerHTML = "";
            
            spawnFood();
            
            // Start the game loop (runs every 120 milliseconds)
            gameLoop = setInterval(drawGame, 120);
        });
    </script>
</body>
</html>
