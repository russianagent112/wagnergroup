<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevents pinch-zoom and scrolling on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIT bhopal seniors smasher</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none; /* Prevents default browser swiping/scrolling */
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            font-size: 1.5rem;
            margin: 20px 0;
        }

        #menu {
            background: #2f3542;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            z-index: 10;
        }

        .legend {
            font-size: 1.2rem;
            margin: 10px 0;
            font-weight: bold;
        }

        button {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            font-weight: bold;
            width: 100%;
        }

        button:active {
            background-color: #27ae60;
            transform: scale(0.95);
        }

        #gameArea {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        #scoreBoard {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 10px 0;
            background: #2f3542;
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        canvas {
            background-color: #2c3e50;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.2);
            /* Mobile responsive sizing */
            width: 100%;
            max-width: 400px;
            height: 75vh; 
        }

        #gameOverMenu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(47, 53, 66, 0.95);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            z-index: 20;
        }

        .game-over-text {
            color: #ff4757;
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .swipe-hint {
            color: #a4b0be;
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>NIT bhopal seniors smasher</h1>
        <div class="legend">🤡 = Nit bhopal seniors</div>
        <div class="legend">🗿 = sigma juniors</div>
        <div class="swipe-hint">👈 Swipe Left / Right to Move 👉</div>
        <button id="playBtn">Play</button>
    </div>

    <div id="gameArea">
        <div id="scoreBoard">Score: <span id="score">0</span></div>
        <!-- Internal canvas resolution is fixed, CSS scales it -->
        <canvas id="gameCanvas" width="300" height="500"></canvas>
    </div>

    <div id="gameOverMenu">
        <div class="game-over-text">Busted by a barrier!</div>
        <div class="legend" id="finalScoreDisplay"></div>
        <button id="restartBtn">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        const playBtn = document.getElementById("playBtn");
        const restartBtn = document.getElementById("restartBtn");
        const menu = document.getElementById("menu");
        const gameArea = document.getElementById("gameArea");
        const gameOverMenu = document.getElementById("gameOverMenu");
        const scoreElement = document.getElementById("score");
        const finalScoreDisplay = document.getElementById("finalScoreDisplay");

        // Game Configuration
        const LANE_COUNT = 3;
        const LANE_WIDTH = canvas.width / LANE_COUNT;
        
        let animationId;
        let score = 0;
        let speed = 4;
        let frames = 0;
        let isGameOver = false;

        // Player (Sigma Junior 🗿)
        const player = {
            lane: 1, // Start in middle lane (0=Left, 1=Middle, 2=Right)
            y: canvas.height - 80,
            size: 40
        };

        // Entities array (🤡 and barriers 🚧)
        let entities = [];

        // Swipe Detection Variables
        let touchStartX = 0;
        let touchEndX = 0;

        // --- Event Listeners for Controls ---
        
        // Touch events for mobile
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        canvas.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        // Keyboard events for desktop testing
        document.addEventListener('keydown', e => {
            if(isGameOver) return;
            if (e.key === "ArrowLeft" || e.key === "a") moveLeft();
            if (e.key === "ArrowRight" || e.key === "d") moveRight();
        });

        function handleSwipe() {
            if(isGameOver) return;
            const swipeThreshold = 30; // minimum pixels to count as swipe
            
            if (touchEndX < touchStartX - swipeThreshold) {
                moveLeft();
            } else if (touchEndX > touchStartX + swipeThreshold) {
                moveRight();
            }
        }

        function moveLeft() {
            if (player.lane > 0) player.lane--;
        }

        function moveRight() {
            if (player.lane < 2) player.lane++;
        }

        // --- Game Logic ---

        function spawnEntity() {
            // Pick a random lane
            const lane = Math.floor(Math.random() * LANE_COUNT);
            
            // 70% chance to spawn a 🤡 (points), 30% chance to spawn a 🚧 (obstacle)
            const type = Math.random() < 0.7 ? "🤡" : "🚧";
            
            entities.push({
                type: type,
                lane: lane,
                y: -50, // Start above the canvas
                size: 40,
                active: true
            });
        }

        function update() {
            frames++;
            
            // Gradually increase speed
            if (frames % 600 === 0) speed += 0.5;

            // Spawn entities periodically (adjust frequency based on speed)
            if (frames % Math.max(30, 80 - Math.floor(speed * 3)) === 0) {
                spawnEntity();
            }

            // Move and check collisions for entities
            for (let i = 0; i < entities.length; i++) {
                let e = entities[i];
                e.y += speed;

                // Collision Box
                const hitBoxX = (e.lane * LANE_WIDTH) + (LANE_WIDTH / 2);
                const playerX = (player.lane * LANE_WIDTH) + (LANE_WIDTH / 2);

                // Check overlap
                if (e.active && 
                    e.lane === player.lane && 
                    e.y + e.size > player.y && 
                    e.y < player.y + player.size) {
                    
                    if (e.type === "🤡") {
                        score += 20; // 20 Points for Seniors
                        scoreElement.innerText = score;
                        e.active = false; // "Smash" the 🤡
                    } else if (e.type === "🚧") {
                        triggerGameOver();
                    }
                }
            }

            // Remove entities that went off screen
            entities = entities.filter(e => e.y < canvas.height + 50 && e.active);
        }

        function draw() {
            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Lanes (subtle dashed lines)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctx.lineWidth = 2;
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(LANE_WIDTH, 0); ctx.lineTo(LANE_WIDTH, canvas.height);
            ctx.moveTo(LANE_WIDTH * 2, 0); ctx.lineTo(LANE_WIDTH * 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]); // Reset line dash

            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Draw Entities
            for (let e of entities) {
                if (e.active) {
                    let entityX = (e.lane * LANE_WIDTH) + (LANE_WIDTH / 2);
                    ctx.fillText(e.type, entityX, e.y);
                }
            }

            // Draw Player 🗿
            let playerX = (player.lane * LANE_WIDTH) + (LANE_WIDTH / 2);
            ctx.fillText("🗿", playerX, player.y);
        }

        function gameLoop() {
            if (isGameOver) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function triggerGameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            finalScoreDisplay.innerText = `Seniors Smashed: ${score / 20}\nTotal Score: ${score}`;
            gameOverMenu.style.display = "block";
        }

        function startGame() {
            menu.style.display = "none";
            gameOverMenu.style.display = "none";
            gameArea.style.display = "flex";
            
            // Reset state
            entities = [];
            score = 0;
            speed = 4;
            frames = 0;
            isGameOver = false;
            player.lane = 1;
            scoreElement.innerText = score;
            
            gameLoop();
        }

        playBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", startGame);

    </script>
</body>
</html>
